name: AI PR Review

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  ai-pr-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Analyze Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet run --project src/AiCodeReviewAgent.Cli --configuration Release -- analyze-pr